<!DOCTYPE html>
<html>
<head>
    <title>Decision Engine</title>
</head>
<body>
<h2>Submit Decision</h2>

<form method="POST">
    User ID:<br>
    <input name="user_id" required><br><br>

    Decision (0–100):<br>
    <input type="number" step="0.01" name="decision_value" required><br><br>

    Confidence (0–100):<br>
    <input type="number" step="0.01" name="confidence" required><br><br>

    Reasoning:<br>
    <textarea name="reasoning"></textarea><br><br>

    <button type="submit">Submit</button>
</form>

<br>
<a href="/dashboard">View Dashboard</a>

<ul>
{% for message in get_flashed_messages() %}
<li>{{ message }}</li>
{% endfor %}
</ul>

</body>
</html>
